name: .NET Build

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches-ignore:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore DockerGameServer.slnx

    - name: Build
      run: dotnet build DockerGameServer.slnx --no-restore --configuration Release

    - name: Test
      run: dotnet test DockerGameServer.slnx --no-build --verbosity normal
