services:
  dockergameserver:
    image: ${DOCKER_REGISTRY-}dockergameserver
    build:
      context: .
      dockerfile: src/DockerGameServer/Dockerfile
    user: root
    environment:
      - ASPNETCORE_ENVIRONMENT=production
      - ASPNETCORE_URLS=https://+:${HTTPS_PORT};http://+:${HTTP_PORT}
      - Kestrel__Certificates__Default__Path=/https/cert.pfx
      - Kestrel__Certificates__Default__Password=${CERT_PASSWORD}
      - Servers__Path=/app/servers
      - Security__MasterKey=${SECURITY_MASTERKEY}
      - Security__HashPepper=${SECURITY_HASHPEPPER}
      - ConnectionStrings__PostgresDb=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    ports:
      - "${HTTP_PORT}:${HTTP_PORT}"
      - "${HTTPS_PORT}:${HTTPS_PORT}"
    volumes:
      # Docker socket for Docker.DotNet
      - /var/run/docker.sock:/var/run/docker.sock

      # Host folder for server data (persistent, shared with Server containers)
      - /opt/gameservers:/app/servers

      # Certificate
      - /opt/certs/cert.pfx:/https/cert.pfx:ro
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
